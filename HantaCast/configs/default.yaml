project:
  name: HantaCast
  title: "HantaCast: A Deep Mechanistically Constrained Hybrid Model for Hantavirus Case Trend Forecasting"

seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_path: data/processed/case_timeseries_standardized.csv
  val_path: data/processed/case_timeseries_standardized.csv  # small-sample: same file, time-ordered split
  test_path: data/processed/case_timeseries_standardized.csv  # small-sample: same file, time-ordered split
  target_column: new_cases
  date_column: date
  feature_columns:
    - new_cases
    - cumulative_cases
    - intervention_index
    - mobility_index
    - flight_volume
    - behavior_response_index
    - day_index

model:
  name: HantaCast
  temporal_module: MixLinear
  mechanistic_module: SEIRD
  input_length: 3
  forecast_horizon: 1
  mixlinear:
    dropout: 0.1
    use_trend: true
    use_frequency: true
    use_covariate: true
    mc_samples: 50
  seird:
    total_population: 147.0
    mixlinear_signal_scale: 0.15
    interval_samples: 120
    param_grid:
      beta0: [0.35, 0.70]
      sigma: [0.14, 0.20]
      gamma: [0.10, 0.18]
      mu: [0.0, 0.02]
      alpha: [0.2, 0.5]
      rho: [0.0, 0.15]
      eta: [0.0, 0.15]
      phi: [0.0, 0.05]
      q: [0.0, 0.2]
      reporting_rate: [0.85, 1.0]
      flight_scale: [5.0]

training:
  lookback: 5
  horizon: 1
  epochs: 80
  batch_size: 8
  learning_rate: 0.01
  weight_decay: 0.001
  early_stopping_patience: 10
  val_split_ratio: 0.8

evaluation:
  lookbacks: [3]
  horizons: [1]
  primary_horizon: 1
  metrics:
    - MAE
    - RMSE
    - MAPE
    - SMAPE
    - peak_timing_error
    - peak_magnitude_error
    - final_cumulative_error
    - poisson_deviance
    - MASE

forecast:
  default_horizon: 150
  step_horizon: 1  # recursive step size
  n_samples: 120

output:
  root: outputs/
  checkpoints: outputs/checkpoints/
  metrics: outputs/metrics/
  predictions: outputs/predictions/
  logs: outputs/logs/
